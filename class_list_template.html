<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Learner Class List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: white;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px auto;
            display: block;
        }
        
        .title h1 {
            font-size: 24px;
            font-weight: bold;
            margin: 0;
            color: #333;
        }
        
        .class-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        .class-table th {
            background-color: #f5f5f5;
            border: 2px solid #333;
            padding: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 12px;
        }
        
        .class-table td {
            border: 2px solid #333;
            padding: 8px;
            text-align: left;
            height: 50px;
            vertical-align: middle;
        }
        
        .name-cell {
            width: 200px;
            text-align: left;
        }
        
        .week-cell {
            width: 80px;
            text-align: center;
        }
        
        .date-header {
            font-size: 10px;
            line-height: 1.2;
        }
        
        .signature-row {
            height: 60px;
        }
        
        @media print {
            body { margin: 10px; }
            .class-table { font-size: 10px; }
            .class-table th { padding: 6px; }
            .class-table td { padding: 6px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="logo_placeholder.png" alt="School Logo" class="logo">
        <h1>Learner Class List - Grade {{GRADE}}</h1>
    </div>
    
    <table class="class-table">
        <thead>
            <tr>
                <th rowspan="2" class="name-cell">Name & Surname</th>
                <th colspan="{{WEEK_COUNT}}" class="date-header">Date: {{MONTH_YEAR}}<br>Signature</th>
            </tr>
            <tr>
                {{WEEK_HEADERS}}
            </tr>
        </thead>
        <tbody>
            {{LEARNER_ROWS}}
        </tbody>
    </table>
</body>
</html>
